version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: clean_anti_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: clean_anti_db
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppassword
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - clean_anti_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clean_anti_app
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      DB_HOST: mysql
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - clean_anti_net

volumes:
  mysql_data:

networks:
  clean_anti_net:
    driver: bridge
